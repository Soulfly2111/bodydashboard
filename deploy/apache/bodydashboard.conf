<VirtualHost *:80>
    ServerName bodydashboard.de
    ServerAlias www.bodydashboard.de

    DocumentRoot /etc/www/bodydashboard

    <Directory /etc/www/bodydashboard>
        Options FollowSymLinks
        AllowOverride None
        Require all granted
        FallbackResource /index.html
    </Directory>

    ProxyPreserveHost On
    ProxyPass /api/ http://127.0.0.1:4000/api/
    ProxyPassReverse /api/ http://127.0.0.1:4000/api/

    ErrorLog ${APACHE_LOG_DIR}/bodydashboard_error.log
    CustomLog ${APACHE_LOG_DIR}/bodydashboard_access.log combined
</VirtualHost>
