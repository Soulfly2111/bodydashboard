ProxyPreserveHost On

ProxyPass /bodydashboard/api/ http://127.0.0.1:4000/api/
ProxyPassReverse /bodydashboard/api/ http://127.0.0.1:4000/api/

Alias /bodydashboard/ "/opt/bodydashboard/current/apps/web/dist/"

<Directory "/opt/bodydashboard/current/apps/web/dist">
    Options FollowSymLinks
    AllowOverride None
    Require all granted
    FallbackResource /bodydashboard/index.html
</Directory>

RewriteEngine On
RewriteRule ^/bodydashboard$ /bodydashboard/ [R=302,L]
