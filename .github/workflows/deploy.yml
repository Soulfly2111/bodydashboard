name: Deploy Bodydashboard

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: bodydashboard-production
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate
        working-directory: .

      - name: Run tests
        run: npm run test

      - name: Build
        run: npm run build

      - name: Create release archive
        run: |
          mkdir -p release
          tar \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='apps/api/prisma/dev.db' \
            --exclude='apps/api/.env' \
            --exclude='apps/web/dist' \
            -czf release/bodydashboard.tar.gz .

      - name: Upload release to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          source: release/bodydashboard.tar.gz
          target: /tmp/bodydashboard
          strip_components: 1

      - name: Activate release on server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            set -euo pipefail
            TMP_DEPLOY_DIR="$(mktemp -d)"
            tar -xzf /tmp/bodydashboard/bodydashboard.tar.gz -C "${TMP_DEPLOY_DIR}" ./deploy/server/deploy-release.sh
            sudo install -m 755 "${TMP_DEPLOY_DIR}/deploy/server/deploy-release.sh" /opt/bodydashboard/deploy/deploy-release.sh
            sudo /opt/bodydashboard/deploy/deploy-release.sh /tmp/bodydashboard/bodydashboard.tar.gz
